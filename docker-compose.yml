services:
  db:
    image: postgres:16-alpine
    container_name: hpcl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hpcl
      POSTGRES_PASSWORD: hpcl
      POSTGRES_DB: hpcl
    ports:
      - "5433:5432"
    volumes:
      - hpcl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpcl"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hpcl_pgdata:
