# Production stack: app + PostgreSQL + Caddy (automatic HTTPS).
# Configure via a .env file next to this one (see .env.production.example).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hpcl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hpcl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpcl"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hpcl:${POSTGRES_PASSWORD}@db:5432/hpcl?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      CRON_SECRET: ${CRON_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CHROME_PATH: /usr/bin/chromium
      # CRIS auto-fetch: pre-authenticated dealer link + RO SAP code (secrets).
      CRIS_LOGIN_URL: ${CRIS_LOGIN_URL}
      CRIS_SAP_CODE: ${CRIS_SAP_CODE}
    expose:
      - "3000"

  # Hourly CRIS auto-fetch. busybox crond fires cris-fetch.sh at the top of every
  # hour, which POSTs the token-protected /api/cris/cron-fetch endpoint on the app
  # (reached directly over the internal network). Each run refreshes today's rows
  # and backfills any missed days. Logs to `docker compose logs cron`. No-ops with
  # a logged warning if CRON_SECRET is unset. NOTE: CRIS allows a single active
  # session — a run that coincides with you being logged into CRIS may fail that
  # hour; it logs out cleanly and the next hour retries.
  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      TZ: Asia/Kolkata
      CRON_SECRET: ${CRON_SECRET}
      CRIS_CRON_URL: http://app:3000/api/cris/cron-fetch
      CRIS_LOG: /proc/1/fd/1
    volumes:
      - ./scripts:/scripts:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        apk add --no-cache curl tzdata >/dev/null
        mkdir -p /etc/crontabs
        printf '0 * * * * /scripts/cris-fetch.sh\n' > /etc/crontabs/root
        echo "[cron] CRIS auto-fetch scheduled hourly (top of every hour)"
        exec crond -f -l 8 -c /etc/crontabs

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
